name: Build, Test and Deploy React Application

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build_test:
    runs-on: ubuntu-latest
    env:
      VITE_API_URL: https://ci-cdcours-production.up.railway.app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Authenticate with npm
        if: github.event_name != 'pull_request'
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Compare local and npm versions
        id: version_check
        if: github.event_name != 'pull_request'
        run: |
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          NPM_VERSION=$(npm view cicd-form version || echo "0.0.0")

          echo "Local version: $LOCAL_VERSION"
          echo "NPM version: $NPM_VERSION"

          if [ "$LOCAL_VERSION" = "$NPM_VERSION" ]; then
            echo "should_publish=false" >> $GITHUB_OUTPUT
          else
            echo "should_publish=true" >> $GITHUB_OUTPUT
          fi

      - name: Run tests
        run: npm run coverage

      - name: Build JSDoc
        run: npm run jsdoc
        
      - name: Build application
        run: npm run build

      - name: Install Playwright browser
        run: node ./node_modules/@playwright/test/cli.js install --with-deps chromium

      - name: Run end-to-end tests
        run: npm run test:e2e

      - name: Verify GitHub Pages asset paths
        run: |
          grep -q '/CI-CD_Cours/assets/' dist/index.html
          grep -R -q 'ci-cdcours-production.up.railway.app' dist/assets

      - name: Validate Docker Compose file
        run: docker compose config

      - name: Setup Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  docker:
    runs-on: ubuntu-latest
    needs: build_test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare image names
        id: images
        run: |
          IMAGE_PREFIX=$(echo "ghcr.io/${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          echo "db=${IMAGE_PREFIX}/mysql" >> "$GITHUB_OUTPUT"
          echo "api=${IMAGE_PREFIX}/python-api" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish MySQL image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: DokerFiles/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.images.outputs.db }}:latest
            ${{ steps.images.outputs.db }}:${{ github.sha }}

      - name: Build and publish Python API image
        uses: docker/build-push-action@v6
        with:
          context: ./python-app
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.images.outputs.api }}:latest
            ${{ steps.images.outputs.api }}:${{ github.sha }}

  deploy:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: build_test

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
     

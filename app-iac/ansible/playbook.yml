cat > app-iac/ansible/playbook.yml <<'EOF'
---
- name: Configure application stack from private registry
  hosts: app
  become: true
  vars:
    app_root: /opt/registry-app
    registry_username: "{{ lookup('env', 'REGISTRY_USERNAME') }}"
    registry_password: "{{ lookup('env', 'REGISTRY_PASSWORD') }}"
    db_name: "{{ lookup('env', 'DB_NAME') }}"
    db_password: "{{ lookup('env', 'DB_PASSWORD') }}"
    admin_username: "{{ lookup('env', 'ADMIN_USERNAME') }}"
    admin_password: "{{ lookup('env', 'ADMIN_PASSWORD') }}"
    admin_token: "{{ lookup('env', 'ADMIN_TOKEN') }}"

  tasks:
    - name: Install Docker and required packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - docker.io
          - docker-compose-v2
          - python3-docker
        state: present
        update_cache: true

    - name: Configure Docker daemon for private registry with self-signed certificate
      ansible.builtin.copy:
        dest: /etc/docker/daemon.json
        mode: "0644"
        content: |
          {
            "insecure-registries": ["{{ registry_host }}"]
          }

    - name: Enable and restart Docker service
      ansible.builtin.service:
        name: docker
        state: restarted
        enabled: true

    - name: Create app directory
      ansible.builtin.file:
        path: "{{ app_root }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Login to private registry
      community.docker.docker_login:
        registry_url: "{{ registry_host }}"
        username: "{{ registry_username }}"
        password: "{{ registry_password }}"
        validate_certs: false
      no_log: true

    - name: Deploy application compose file
      ansible.builtin.template:
        src: docker-compose.yml.j2
        dest: "{{ app_root }}/docker-compose.yml"
        mode: "0644"
      no_log: true

    - name: Start application stack
      community.docker.docker_compose_v2:
        project_src: "{{ app_root }}"
        state: present
        pull: always
EOF
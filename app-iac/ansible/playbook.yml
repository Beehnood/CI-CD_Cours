---
- name: Configure application stack from private registry
  hosts: app
  become: true
  vars:
    app_root: /opt/registry-app
    ansible_python_interpreter: /usr/bin/python3
    registry_username: "{{ lookup('env', 'REGISTRY_USERNAME') }}"
    registry_password: "{{ lookup('env', 'REGISTRY_PASSWORD') }}"
    db_name: "{{ lookup('env', 'DB_NAME') }}"
    db_password: "{{ lookup('env', 'DB_PASSWORD') }}"
    admin_username: "{{ lookup('env', 'ADMIN_USERNAME') }}"
    admin_password: "{{ lookup('env', 'ADMIN_PASSWORD') }}"
    admin_token: "{{ lookup('env', 'ADMIN_TOKEN') }}"

  tasks:
    - name: Install Docker and required packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - docker.io
          - docker-compose-v2
          - python3-docker
        state: present
        update_cache: true

    - name: Configure Docker daemon for private registry with self-signed certificate
      ansible.builtin.copy:
        dest: /etc/docker/daemon.json
        mode: "0644"
        content: |
          {
            "insecure-registries": ["{{ registry_host }}"]
          }
      notify: Restart Docker

    - name: Enable and start Docker service
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Create swap file for small EC2 instances
      ansible.builtin.command:
        cmd: fallocate -l 2G /swapfile
        creates: /swapfile

    - name: Secure swap file permissions
      ansible.builtin.file:
        path: /swapfile
        owner: root
        group: root
        mode: "0600"

    - name: Initialize swap file
      ansible.builtin.command:
        cmd: mkswap /swapfile
      register: mkswap_result
      changed_when: "'setting up swapspace' in mkswap_result.stdout | lower"
      when: ansible_swaptotal_mb == 0

    - name: Enable swap file
      ansible.builtin.command:
        cmd: swapon /swapfile
      when: ansible_swaptotal_mb == 0

    - name: Persist swap file
      ansible.builtin.mount:
        name: none
        src: /swapfile
        fstype: swap
        opts: sw
        passno: "0"
        dump: "0"
        state: present

    - name: Apply Docker configuration changes
      ansible.builtin.meta: flush_handlers

    - name: Reset SSH connection after Docker service changes
      ansible.builtin.meta: reset_connection

    - name: Wait for SSH connection after Docker service changes
      ansible.builtin.wait_for_connection:
        timeout: 120
        delay: 5

    - name: Create app directory
      ansible.builtin.file:
        path: "{{ app_root }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Login to private registry
      community.docker.docker_login:
        registry_url: "{{ registry_host }}"
        username: "{{ registry_username }}"
        password: "{{ registry_password }}"
        validate_certs: false
      no_log: true

    - name: Deploy application compose file
      ansible.builtin.template:
        src: docker-compose.yml.j2
        dest: "{{ app_root }}/docker-compose.yml"
        mode: "0644"
      no_log: true

    - name: Start application stack
      community.docker.docker_compose_v2:
        project_src: "{{ app_root }}"
        state: present
        pull: always

  handlers:
    - name: Restart Docker
      ansible.builtin.service:
        name: docker
        state: restarted
